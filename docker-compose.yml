services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flotacontrol-app
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
    volumes:
      - .:/var/www/html
      - uploads:/var/www/html/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - flotacontrol

  nginx:
    image: nginx:1.25-alpine
    container_name: flotacontrol-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - uploads:/var/www/html/uploads:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - flotacontrol

  mysql:
    image: mysql:8.0
    container_name: flotacontrol-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-flotacontrol}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flotacontrol

volumes:
  uploads:
    driver: local
  mysql_data:
    driver: local

networks:
  flotacontrol:
    driver: bridge
