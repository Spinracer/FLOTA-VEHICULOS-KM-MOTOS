server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    client_max_body_size 25M;

    # ── Block sensitive files ──
    location ~ /\.env { deny all; return 404; }
    location ~ /\.git { deny all; return 404; }
    location ^~ /includes/ { deny all; return 404; }
    location ^~ /modules/ { deny all; return 404; }
    location ^~ /scripts/ { deny all; return 404; }
    location ^~ /tests/ { deny all; return 404; }
    location ^~ /docker/ { deny all; return 404; }
    location ~ /deploy\.sh { deny all; return 404; }

    # ── Static files ──
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── PHP via FPM ──
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        fastcgi_index index.php;
    }

    # ── Block hidden files and non-web extensions ──
    location ~ /\. { deny all; }
    location ~* \.(md|sh|lock|example)$ { deny all; return 404; }

    # ── Default ──
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
